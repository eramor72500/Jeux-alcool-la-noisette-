<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎲 Jeu Hardcore</title>

<style>
body {
  margin:0;
  font-family: Arial;
  color:white;
  text-align:center;
  background: radial-gradient(circle,#6b4a2f,#2b1a10);
}

.container {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.dice {
  width:120px;
  height:120px;
  background:white;
  border-radius:20px;
  display:inline-grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  padding:15px;
  margin:15px;
  box-shadow:0 15px 25px rgba(0,0,0,0.7);
}

.dot {
  width:16px;
  height:16px;
  background:black;
  border-radius:50%;
  margin:auto;
}

.fall { animation:fall 0.6s ease; }

@keyframes fall {
  0%{transform:translateY(-200px) rotateX(0);opacity:0;}
  100%{transform:translateY(0) rotateX(360deg);opacity:1;}
}

.locked {
  box-shadow:0 0 25px yellow;
  transform:scale(1.1);
}

.rule {
  font-size:28px;
  margin:20px;
}

button {
  padding:14px 22px;
  font-size:18px;
  border-radius:12px;
  border:none;
  background:#ff4757;
  color:white;
  margin:5px;
}
</style>
</head>

<body>

<div class="container">

  <div>
    <div class="dice" id="d1"></div>
    <div class="dice" id="d2"></div>
  </div>

  <div>
    <div class="rule" id="rule">Appuie ou secoue</div>
    <button onclick="rollDice()">Lancer</button>
    <button onclick="freeRoll()">🎯 Dé libre</button>
  </div>

</div>

<script>
let diceValues=[1,1];
let locked=[false,false];

let kinito=false;
let tries=0;

let rules=JSON.parse(localStorage.getItem("rules")||"{}");

// 🎲 affichage
function draw(el,val){
  const p={1:[4],2:[0,8],3:[0,4,8],4:[0,2,6,8],5:[0,2,4,6,8],6:[0,2,3,5,6,8]};
  el.innerHTML="";
  for(let i=0;i<9;i++){
    let d=document.createElement("div");
    if(p[val].includes(i)) d.className="dot";
    el.appendChild(d);
  }
}

function update(){
  draw(d1,diceValues[0]);
  draw(d2,diceValues[1]);
  d1.classList.toggle("locked",locked[0]);
  d2.classList.toggle("locked",locked[1]);
}

function vibrate(){
  if(navigator.vibrate) navigator.vibrate(80);
}

function animate(){
  d1.classList.add("fall");
  d2.classList.add("fall");
  setTimeout(()=>{
    d1.classList.remove("fall");
    d2.classList.remove("fall");
  },600);
}

// 🎲 lancer normal
function rollDice(){

  vibrate();
  animate();

  diceValues=[Math.floor(Math.random()*6)+1,Math.floor(Math.random()*6)+1];
  update();

  let d1v=diceValues[0], d2v=diceValues[1];
  let result=""+d1v+d2v, reversed=""+d2v+d1v;

  let text="", relance=false;

  // 😈 CATIN
  if(result==="41"||reversed==="41"){
    text="😈 CATIN → tu bois + relance";
    relance=true;
  }

  // 🔥 DOUBLE 6 → CREATION REGLE
  else if(d1v===6 && d2v===6){

    let combo = prompt("Sur quel résultat ? (ex: 12)");
    let ruleText = prompt("Écris la règle 😈");

    if(combo && ruleText){
      rules[combo]=ruleText;
      localStorage.setItem("rules",JSON.stringify(rules));
      text="🧠 règle ajoutée sur "+combo;
    }
  }

  // 🔥 DOUBLES
  else if(d1v===d2v){
    text="🔥 Double "+d1v+" → bois "+d1v;
    relance=true;
  }

  // 🎯 règles
  else if(result==="21"){ text="⬅️ avant boit"; relance=true; }
  else if(result==="61"){ text="➡️ après boit"; relance=true; }
  else if(result==="51"){ text="👃 dernier nez boit"; relance=true; }

  else if(result==="65"||reversed==="65"){
    kinito=true;
    tries=0;
    locked=[false,false];
    text="🎯 KINITO → utilise Dé libre";
  }

  // 📜 règles custom
  if(rules[result]){
    text="🧠 "+rules[result];
    relance=true;
  }

  if(!text) text="👉 Donne les dés";

  if(relance) text+="<br>🔁 Tu peux relancer";

  rule.innerHTML=text;
}

// 🎯 MODE KINITO (dé libre)
function freeRoll(){

  if(!kinito){
    rule.textContent="Fais 65 pour activer le Kinito";
    return;
  }

  vibrate();
  animate();

  tries++;

  for(let i=0;i<2;i++){

    if(locked[i]) continue;

    let val=Math.floor(Math.random()*6)+1;
    diceValues[i]=val;

    // 🔒 AUTO LOCK 5 ou 6
    if(val===5 || val===6){
      locked[i]=true;
    }
  }

  update();

  let result=""+diceValues[0]+diceValues[1];

  rule.innerHTML="🎯 Kinito "+tries+"/3";

  if(result==="65"||result==="56"){
    rule.innerHTML+="<br>🔥 RÉUSSI";
    kinito=false;
    locked=[false,false];
    return;
  }

  if(tries>=3){
    rule.innerHTML+="<br>❌ Perdu";
    kinito=false;
    locked=[false,false];
  }
}

// 📱 secouer
let lastTime=0;
window.addEventListener("devicemotion",e=>{
  let acc=e.accelerationIncludingGravity;
  let force=Math.abs(acc.x)+Math.abs(acc.y)+Math.abs(acc.z);

  let now=Date.now();

  if(force>30 && now-lastTime>800){
    rollDice();
    lastTime=now;
  }
});

update();
</script>

</body>
</html>
